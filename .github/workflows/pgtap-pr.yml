name: pgTAP PR Smoke

# TEST-02 (Session 37) — PR-time pgTAP smoke gate.
#
# The full pgTAP suite runs nightly (pgtap-nightly.yml, cron). Before this
# workflow, NO DB test ran at PR time, so a breaking migration could merge
# with zero database coverage. This workflow runs a small, fast SUBSET of
# critical guard tests (REVOKE pairs / money-flow integrity) against the
# cloud V3 dev project (ikcyvlovptebroadgtvd) via the same pooler connection
# and secret as the nightly.
#
# Scope: only fires on PRs that touch DB surface (migrations, pgTAP tests,
# Edge Functions) — front-only PRs skip it entirely (paths filter below).

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/tests/**'
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: pgtap-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pgtap-smoke:
    # Dependabot-triggered runs read from the separate "Dependabot secrets"
    # store, so V3_DEV_PG_POOLER_URL is empty there and the secret guard below
    # hard-fails. Dependency bumps can't break the DB schema — skip instead.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # S50: flipped to false — V3_DEV_PG_POOLER_URL confirmed present (same as
    # nightly). Failures now block the PR. Revert to true only if the secret
    # becomes unavailable for fork PRs (rare on this private repo).
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4

      # Same psql approach as pgtap-nightly.yml — keep the two in sync.
      # Quota 2026-07 — psql préinstallé sur le runner ubuntu-latest ; on
      # n'ajoute plus le dépôt pgdg (~1-2 min économisées par run).
      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y postgresql-client
          fi
          psql --version

      # Smoke subset — critical REVOKE / permission / money-flow guards,
      # chosen for speed (smallest files) and blast-radius coverage:
      #   - ci_smoke                          : pgTAP plumbing sanity
      #   - send_items_anon_revoke            : S36 canonical REVOKE pair guard
      #   - security_anon_grants              : S20 anon/PUBLIC grant sweep
      #   - security_authenticated_policies   : RLS policies for authenticated
      #   - security_refund_sequences         : refund money-flow integrity
      #   - products_cost_price_guard         : cost_price REVOKE UPDATE guard
      #   - security                          : core security suite
      #   - security_leak_guard               : S50 view/MV PII-financial leak guard
      #   - financial_rpc_perm_gates          : S50 permission-denied on gated RPCs
      - name: Run pgTAP smoke subset via pooler
        id: pgtap
        env:
          PGURL: ${{ secrets.V3_DEV_PG_POOLER_URL }}
        run: |
          set -uo pipefail
          if [ -z "${PGURL:-}" ]; then
            echo "::error::V3_DEV_PG_POOLER_URL secret is not set" >&2
            exit 1
          fi
          smoke_files=(
            supabase/tests/ci_smoke.test.sql
            supabase/tests/send_items_anon_revoke.test.sql
            supabase/tests/security_anon_grants.test.sql
            supabase/tests/security_authenticated_policies.test.sql
            supabase/tests/security_refund_sequences.test.sql
            supabase/tests/products_cost_price_guard.test.sql
            supabase/tests/security.test.sql
            supabase/tests/security_leak_guard.test.sql
            supabase/tests/financial_rpc_perm_gates.test.sql
          )
          fail_count=0
          fail_list=""
          for f in "${smoke_files[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::smoke file missing from repo: $f" >&2
              fail_count=$((fail_count+1))
              fail_list="${fail_list}\n - ${f} (missing)"
              continue
            fi
            echo "=== Running $f ==="
            # S77: fail on psql error OR any TAP 'not ok' line (assertion
            # failures never flip psql's exit code — mirror of pgtap-nightly).
            # `|| rc=$?` keeps the runner's implicit `bash -e` from killing
            # the loop on the first failing file.
            rc=0
            out=$(psql "$PGURL" -v ON_ERROR_STOP=1 -f "$f" 2>&1) || rc=$?
            printf '%s\n' "$out"
            not_ok=$(printf '%s\n' "$out" | grep -cE '^[[:space:]]*not ok [0-9]' || true)
            if [ "$rc" -ne 0 ] || [ "$not_ok" -gt 0 ]; then
              fail_count=$((fail_count+1))
              fail_list="${fail_list}\n - ${f} (exit=${rc}, not_ok=${not_ok})"
            fi
          done
          if [ "$fail_count" -gt 0 ]; then
            echo "::error::${fail_count} pgTAP smoke file(s) failed:${fail_list}"
            exit 1
          fi
          echo "All pgTAP smoke files passed."
