name: Playwright E2E

# Nightly smoke suite + on-demand trigger. Does NOT gate PRs so flaky first-run
# selector issues don't block developer flow. Run manually via workflow_dispatch
# after adding/updating data-testid selectors.
#
# Required secrets (create via: gh secret set <NAME>):
#   STAGING_POS_URL     — e.g. https://pos.staging.thebreakery.id
#   STAGING_BO_URL      — e.g. https://backoffice.staging.thebreakery.id
#   E2E_PIN_CASHIER     — 6-digit PIN for the seed cashier user
#   E2E_PIN_ADMIN       — 6-digit PIN for the seed admin/owner user
#   E2E_KIOSK_JWT       — (optional) kiosk JWT to bypass pair-device prompt
#
# See .github/workflows/STAGING_SETUP.md for provisioning steps.

on:
  schedule:
    - cron: '0 22 * * *'  # 22:00 UTC = 05:00 ICT next day
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          CI: 'true'
          E2E_POS_URL: ${{ secrets.STAGING_POS_URL }}
          E2E_BO_URL: ${{ secrets.STAGING_BO_URL }}
          E2E_PIN_CASHIER: ${{ secrets.E2E_PIN_CASHIER }}
          E2E_PIN_ADMIN: ${{ secrets.E2E_PIN_ADMIN }}
          E2E_KIOSK_JWT: ${{ secrets.E2E_KIOSK_JWT }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
