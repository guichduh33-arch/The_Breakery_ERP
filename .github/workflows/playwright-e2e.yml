name: Playwright E2E

# Build-and-serve-in-CI model (S71). The job builds both apps and serves them
# on localhost via Playwright's webServer, pointing at the dev V3 backend.
# No hosted staging URLs, no Vercel.
#
# Required secrets:
#   VITE_SUPABASE_ANON_KEY   — dev V3 anon (publishable) key (build-time)
#   E2E_PIN_ADMIN            — 6-digit PIN for E2E owner  (0e2e0000-…-001)
#   E2E_PIN_CASHIER          — 6-digit PIN for E2E cashier (0e2e0000-…-002)
#   V3_DEV_PG_POOLER_URL     — pooler connection string (already set 2026-05-16)
#
# Nightly cron armed S71 Plan 2 once all 12 specs proved green in a combined
# run (26 passed / 2 intentional fixmes / 0 failed). 22:00 UTC daily. The
# rate-limit-resilient login (fixtures/auth.ts) keeps the bunched-login run
# green against the auth-verify-pin 3/min/IP limit. Still dispatchable on demand.
on:
  workflow_dispatch:
  schedule:
    # Quota 2026-07 — 2×/semaine au lieu de quotidien (~-300 min/mois).
    # 22:00 UTC lun/jeu = 05:00 Asia/Jakarta mar/ven. Dispatchable à la
    # demande entre deux crons.
    - cron: '0 22 * * 1,4'

env:
  VITE_SUPABASE_URL: https://ikcyvlovptebroadgtvd.supabase.co

jobs:
  e2e:
    name: Playwright E2E (build + serve in-CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # S77 post-merge: no `version:` — the action reads package.json's
      # packageManager (pnpm@9.15.0). Pinning `9.15` here conflicted with it
      # ("Multiple versions of pnpm specified") and killed every nightly E2E
      # run in ~10s — the D-8 S76 "missing secrets" theory was stale, the 3
      # E2E secrets have existed since 2026-07-09.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Provision E2E state (PINs + open shift)
        env:
          PGURL: ${{ secrets.V3_DEV_PG_POOLER_URL }}
          E2E_PIN_ADMIN: ${{ secrets.E2E_PIN_ADMIN }}
          E2E_PIN_CASHIER: ${{ secrets.E2E_PIN_CASHIER }}
        run: |
          psql "$PGURL" -v ON_ERROR_STOP=1 \
            -v adminpin="$E2E_PIN_ADMIN" -v cashpin="$E2E_PIN_CASHIER" \
            -f scripts/e2e/provision-pins.sql

      - name: Run Playwright tests
        run: pnpm exec playwright test
        env:
          CI: 'true'
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_POS_URL: http://localhost:5173
          E2E_BO_URL: http://localhost:5174
          E2E_PIN_ADMIN: ${{ secrets.E2E_PIN_ADMIN }}
          E2E_PIN_CASHIER: ${{ secrets.E2E_PIN_CASHIER }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
