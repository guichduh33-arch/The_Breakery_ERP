name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test
        env:
          # Tests qui requièrent la stack Supabase ne sont pas lancés ici
          # (ils sont taggés via test config et exécutés séparément).
          VITE_SUPABASE_URL: http://stub-not-used.local
          VITE_SUPABASE_ANON_KEY: stub
          VITE_SENTRY_DSN_POS: ''
          VITE_SENTRY_DSN_BACKOFFICE: ''
          # The Breakery runs in Asia/Jakarta. Session-9 promotion matchers
          # use `Date#getHours()` / `getDay()` (local time). CI runners default
          # to UTC, which shifts Mon 18:30 +07 into Mon 11:30 UTC and breaks
          # Happy Hour window tests. Pin the runner TZ to match prod.
          TZ: Asia/Jakarta

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: http://stub-not-used.local
          VITE_SUPABASE_ANON_KEY: stub
          VITE_SENTRY_DSN_POS: ''
          VITE_SENTRY_DSN_BACKOFFICE: ''

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: 'apps/*/dist/**'
          if-no-files-found: error

  supabase-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: 'pnpm' }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with: { version: latest }

      - name: Start Supabase
        run: supabase start

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Run Supabase integration tests
        run: pnpm --filter @breakery/supabase-tests test
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ env.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run pgTAP database tests
        run: supabase test db
