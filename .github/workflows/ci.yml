name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# CI-speedup — each new push to a PR cancels the obsolete run of the same
# ref; master pushes are never cancelled (each one must produce its full
# verdict + artifacts).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    # 25 (was 15): the suite runs 11-13 min on a healthy runner, so a slow
    # runner day cancelled green runs mid-Build/mid-tests (2× on 2026-07-11).
    timeout-minutes: 25
    env:
      # CI-speedup — explicit turbo cache location (matches the 2.x default)
      # so the "Turbo cache" actions/cache step always captures the artifacts.
      TURBO_CACHE_DIR: .turbo/cache
    steps:
      - uses: actions/checkout@v7
        with:
          # Need the merge-base with the PR target so the has_permission
          # guard can scan only newly-introduced migrations.
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # CI-speedup — persist the turbo local cache across runs. Task outputs
      # are declared in turbo.json and the VITE_* stubs below are stable, so
      # unchanged packages replay from cache instead of re-running.
      # `restore-keys` falls back to the most recent cache from any branch;
      # the sha-suffixed key stores this run's updated cache.
      - name: Turbo cache
        uses: actions/cache@v6
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      # W1-C4 — Session 13 D10/Audit R14 guard:
      # has_permission() was locked as a pure-lookup function (signature
      # p_uid UUID, p_perm TEXT). No subsequent migration may CREATE OR
      # REPLACE / CREATE / DROP it — new perms are added via INSERT INTO
      # permissions + role_permissions. Historically broke RLS (11 prior
      # re-CREATEs).
      #
      # Scope: only check migrations INTRODUCED BY THIS PR (diff against the
      # base branch). The previous version scanned the entire post-lock glob
      # which kept flagging 3 Session 13 files already merged into master.
      - name: Guard has_permission lock (D10 / Audit R14)
        run: |
          set -e
          # On a PR, base is the merge target. On a push to master the diff
          # is empty (HEAD~1..HEAD) which is fine — push events shouldn't
          # introduce new violations beyond what the prior PR already
          # cleared.
          if [ -n "${{ github.base_ref }}" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
          else
            base="HEAD~1"
          fi
          new_migrations=$(git diff --name-only --diff-filter=A "$base"...HEAD -- 'supabase/migrations/*.sql' || true)
          if [ -z "$new_migrations" ]; then
            echo "No new migrations in this diff."
            exit 0
          fi
          violations=$(echo "$new_migrations" | xargs -r grep -EnH "(CREATE OR REPLACE|CREATE) +FUNCTION +(public\.)?has_permission\b" || true)
          if [ -n "$violations" ]; then
            echo "::error::has_permission re-CREATE detected in NEW migrations (D10/R14 lock):"
            echo "$violations"
            exit 1
          fi
          echo "$new_migrations" | sed 's/^/  scanned: /'

      # S50 — Guard types.generated.ts regen (migration → types sync).
      # If a new migration is added in this PR/push, types.generated.ts must
      # also have been updated in the same diff. This catches the #1 source of
      # broken CI on this repo (stale types after a schema change).
      # Content-level drift (file vs live schema) is verified nightly via
      # pgtap-nightly.yml drift-checks job, which requires cloud secrets.
      # Escape hatch (PR #142): a migration that only CREATE OR REPLACEs an
      # existing function body (same signature) regenerates byte-identical
      # types — nothing to commit. The author runs the regen, verifies zero
      # diff, and tags a commit message with [types-noop]; the nightly drift
      # job remains the content-level backstop. Do NOT tag without running
      # the regen first.
      - name: Guard types.generated.ts regen (S50 migration-sync gate)
        run: |
          set -e
          if [ -n "${{ github.base_ref }}" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
          else
            base="HEAD~1"
          fi
          new_migrations=$(git diff --name-only --diff-filter=A "$base"...HEAD -- 'supabase/migrations/*.sql' || true)
          if [ -z "$new_migrations" ]; then
            echo "No new migrations in this diff — types regen guard skipped."
            exit 0
          fi
          types_changed=$(git diff --name-only "$base"...HEAD -- 'packages/supabase/src/types.generated.ts' || true)
          if [ -z "$types_changed" ]; then
            if git log "$base"..HEAD --format=%B | grep -qF '[types-noop]'; then
              echo "[types-noop] tag found — author ran the regen and verified byte-identical output (body-only migrations). Nightly drift job remains the content check."
              exit 0
            fi
            echo "::error::New migration(s) added but types.generated.ts was NOT regenerated."
            echo "Run generate_typescript_types via MCP and commit packages/supabase/src/types.generated.ts."
            echo "If the regen output is byte-identical (body-only CREATE OR REPLACE), tag a commit message with [types-noop] instead."
            printf '%s\n' "$new_migrations" | sed 's/^/  + /'
            exit 1
          fi
          echo "types.generated.ts regenerated alongside new migrations — OK."

      # Lint is non-blocking: 250+ pre-existing tech-debt errors across the
      # monorepo (mostly @typescript-eslint stylistic rules + React Hook
      # ordering issues). They were hidden by the broken has_permission
      # guard above failing first; cleanup is tracked as a Session 15 task.
      # Step still runs to surface findings in the action log.
      - name: Lint (non-blocking, see Session 15 lint-cleanup ticket)
        run: pnpm lint
        continue-on-error: true

      # S57 / P2.5 — lint-ratchet (BLOCKING). The full-repo lint step above stays
      # non-blocking (250+ pre-existing tech-debt errors). This step enforces a
      # clean bill on ONLY the .ts/.tsx files this PR touches, so new code cannot
      # add lint debt while the backlog is worked down. Zero touched files → no-op
      # pass.
      #
      # Scope note: restricted to `**/src/**` — this mirrors exactly what
      # `pnpm lint` covers (each workspace runs `eslint src`). Files outside a
      # package `src/` (supabase/functions, supabase/tests, root/config .ts,
      # tools/) are NOT in any tsconfig reachable by the root projectService, so
      # linting them yields "not found by the project service" parse errors —
      # they were never in lint scope and must stay out of the ratchet too.
      # types.generated.ts is machine-generated and excluded. Deletions are
      # filtered out (ACMR) so we never lint a path that no longer exists.
      - name: Lint ratchet (blocking, changed files only)
        run: |
          set -e
          if [ -n "${{ github.base_ref }}" ]; then
            base="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
          else
            base="HEAD~1"
          fi
          changed=$(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- \
            '**/src/**/*.ts' '**/src/**/*.tsx' ':(exclude)**/*.generated.ts' || true)
          if [ -z "$changed" ]; then
            echo "No changed src .ts/.tsx files in this diff — lint ratchet skipped."
            exit 0
          fi
          printf '%s\n' "$changed" | sed 's/^/  linting: /'
          printf '%s\n' "$changed" | xargs -r pnpm exec eslint

      - name: Typecheck
        run: pnpm typecheck

      # CI-speedup — on PRs, only the packages affected since the merge-base
      # with the target branch run (plus their dependents, via the `...`
      # prefix). The FULL suite still runs on every push to master (step
      # below) and stays the nightly's responsibility — no coverage is lost,
      # it is deferred to post-merge.
      - name: Unit tests (PR — affected packages only)
        if: github.base_ref != ''
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1 || true
          pnpm exec turbo run test --filter="...[origin/${{ github.base_ref }}]"
        env:
          # Tests qui requièrent la stack Supabase ne sont pas lancés ici
          # (ils sont taggés via test config et exécutés séparément).
          VITE_SUPABASE_URL: http://stub-not-used.local
          VITE_SUPABASE_ANON_KEY: stub
          VITE_SENTRY_DSN_POS: ''
          VITE_SENTRY_DSN_BACKOFFICE: ''
          # The Breakery runs in Asia/Jakarta. Session-9 promotion matchers
          # use `Date#getHours()` / `getDay()` (local time). CI runners default
          # to UTC, which shifts Mon 18:30 +07 into Mon 11:30 UTC and breaks
          # Happy Hour window tests. Pin the runner TZ to match prod.
          TZ: Asia/Jakarta

      - name: Unit tests (full suite — push to master)
        if: github.base_ref == ''
        run: pnpm test
        env:
          # Tests qui requièrent la stack Supabase ne sont pas lancés ici
          # (ils sont taggés via test config et exécutés séparément).
          VITE_SUPABASE_URL: http://stub-not-used.local
          VITE_SUPABASE_ANON_KEY: stub
          VITE_SENTRY_DSN_POS: ''
          VITE_SENTRY_DSN_BACKOFFICE: ''
          TZ: Asia/Jakarta

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: http://stub-not-used.local
          VITE_SUPABASE_ANON_KEY: stub
          VITE_SENTRY_DSN_POS: ''
          VITE_SENTRY_DSN_BACKOFFICE: ''

      # Quota 2026-07 — retention 3 j (défaut 90 j remplissait les 2 Go de
      # stockage Actions à lui seul). Personne ne consomme un coverage vieux
      # de plus de quelques jours.
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore
          retention-days: 3

      # Quota 2026-07 — dist uploadé UNIQUEMENT sur push master (le dist d'une
      # PR n'a aucun consommateur), retention 7 j au lieu du défaut 90 j.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name == 'push'
        with:
          name: dist
          path: 'apps/*/dist/**'
          if-no-files-found: error
          retention-days: 7
