name: pgTAP Nightly

on:
  schedule:
    # Quota 2026-07 — 3×/semaine au lieu de quotidien (~-500 min/mois).
    # 19:00 UTC dim/mar/jeu = 02:00 Asia/Jakarta lun/mer/ven. Le smoke PR
    # (pgtap-pr.yml) reste le filet à chaque PR touchant la DB ; dispatch
    # manuel toujours possible entre deux crons.
    - cron: '0 19 * * 0,2,4'
  workflow_dispatch:

jobs:
  pgtap:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      # Quota 2026-07 — le runner ubuntu-latest embarque déjà un client psql
      # (le job E2E l'utilise tel quel depuis S71). L'ajout du dépôt pgdg +
      # apt update coûtait ~1-2 min/job pour la même major.
      - name: Ensure psql is available
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y postgresql-client
          fi
          psql --version

      # S77: a file now fails on EITHER a psql error OR any `not ok` assertion in
      # its TAP output. Before this, pgTAP assertion failures never flipped psql's
      # exit code, so suites failed silently for weeks (fiche 23 "filet troué" —
      # 15 files / ~34 red assertions invisible in a "green-looking" job).
      - name: Run pgTAP suite via pooler
        id: pgtap
        env:
          PGURL: ${{ secrets.V3_DEV_PG_POOLER_URL }}
        run: |
          set -uo pipefail
          if [ -z "${PGURL:-}" ]; then
            echo "::error::V3_DEV_PG_POOLER_URL secret is not set" >&2
            exit 1
          fi
          fail_count=0
          fail_list=""
          shopt -s nullglob
          for f in supabase/tests/*.test.sql; do
            echo "=== Running $f ==="
            # `|| rc=$?` keeps the runner's implicit `bash -e` from killing the
            # whole loop on the first failing file (a bare assignment would).
            rc=0
            out=$(psql "$PGURL" -v ON_ERROR_STOP=1 -f "$f" 2>&1) || rc=$?
            printf '%s\n' "$out"
            not_ok=$(printf '%s\n' "$out" | grep -cE '^[[:space:]]*not ok [0-9]' || true)
            if [ "$rc" -ne 0 ] || [ "$not_ok" -gt 0 ]; then
              fail_count=$((fail_count+1))
              fail_list="${fail_list}\n - ${f} (exit=${rc}, not_ok=${not_ok})"
            fi
          done
          if [ "$fail_count" -gt 0 ]; then
            echo "::error::${fail_count} pgTAP file(s) failed:${fail_list}"
            exit 1
          fi
          echo "All pgTAP files passed."

      - name: Comment on tracking issue (failure)
        if: failure() && vars.PGTAP_TRACKING_ISSUE != '' && vars.PGTAP_TRACKING_ISSUE != '0'
        uses: actions/github-script@v9
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            if (!Number.isInteger(issueNumber) || issueNumber <= 0) {
              core.info(`PGTAP_TRACKING_ISSUE not set, skipping comment.`);
              return;
            }
            await github.rest.issues.createComment({
              issue_number: issueNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `pgTAP nightly failed on \`${context.sha.slice(0,7)}\` — see [run #${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            });
        env:
          ISSUE_NUMBER: ${{ vars.PGTAP_TRACKING_ISSUE }}

  # S50 — Live-RPC Vitest suite (supabase/tests/functions/*.test.ts, ~62 files).
  # Requires SUPABASE_SERVICE_ROLE_KEY repository secret. Tests are env-gated
  # (they skip gracefully when env vars are absent), but we fail fast here to
  # ensure the secret is present and the suite actually runs.
  #
  # S58 fix (T4): the test files read VITE_SUPABASE_URL (~60 files) with a hard
  # fallback to http://127.0.0.1:54321 (retired local Docker stack). Exporting
  # only SUPABASE_URL left them dialing localhost — the real cause of the
  # nightly "TypeError: fetch failed / ECONNREFUSED 127.0.0.1:54321".
  # S77: the SUPABASE_ANON_KEY secret is now OPTIONAL — the shared test helper
  # (supabase/tests/functions/_helpers/auth.ts) falls back to the project's
  # real publishable key (public by design). Logins are minted via the GoTrue
  # admin API with a run-level token cache instead of hammering the rate-limited
  # auth-verify-pin EF (~3/min/IP — the cause of the nightly rate_limited storm).
  live-rpc-vitest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # S77: run AFTER the pgtap job, not in parallel with it — both hit the SAME
    # shared dev DB, and the vitest flows contend with pgTAP suites on hot rows
    # (invoice_sequences, order_sequences, business_config id=1 pins) → deadlocks.
    # This was invisible before S77 only because the login rate-limit storm
    # killed the vitest job within ~2 min, leaving pgtap alone on the DB.
    needs: pgtap
    if: ${{ always() }}
    env:
      SUPABASE_URL: https://ikcyvlovptebroadgtvd.supabase.co
      VITE_SUPABASE_URL: https://ikcyvlovptebroadgtvd.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Run live-RPC Vitest suite
        run: |
          set -uo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY secret is not set — live-RPC tests cannot run." >&2
            exit 1
          fi
          pnpm --filter @breakery/supabase-tests test

  # S50 — Drift checks (types.generated.ts + schema_migrations).
  # Both steps use V3_DEV_PG_POOLER_URL secret; they skip with a warning if
  # the secret is absent rather than blocking the entire nightly run.
  drift-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      # Quota 2026-07 — psql préinstallé sur le runner (voir job pgtap) ;
      # seule la CLI supabase reste à télécharger.
      - name: Ensure psql + install Supabase CLI
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -q && sudo apt-get install -y postgresql-client
          fi
          psql --version
          # supabase CLI (latest release)
          curl -fsSL \
            https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar xz -C /usr/local/bin supabase

      # Regenerate types against the live dev DB and check for uncommitted drift.
      # Uses --db-url (pooler connection string) — no SUPABASE_ACCESS_TOKEN required.
      # If the regen produces a diff, it means a migration was applied on the cloud
      # but types.generated.ts was not committed. Fail hard so it's visible.
      #
      # S58 fix (T4): normalize the comparison — the committed file is generated
      # via the MCP tool, whose output covers ONLY the public schema, while the
      # bare CLI also emits a graphql_public section. Without --schema public the
      # step flagged a permanent structural pseudo-drift (see run 28680835452).
      # S77: compare NORMALIZED outputs. The committed file is the MCP generator's
      # verbatim output (project convention — Docker retired, regen via MCP); the
      # CLI's only structural delta vs MCP is the `__InternalSupabase` metadata
      # block (MCP emits it, the CLI does not). Strip it from both sides plus
      # trailing whitespace, then compare. Everything else (tables, partitions,
      # functions, ordering) must match byte-for-byte or the check fails.
      - name: Check types.generated.ts drift
        env:
          PGURL: ${{ secrets.V3_DEV_PG_POOLER_URL }}
        run: |
          set -uo pipefail
          if [ -z "${PGURL:-}" ]; then
            echo "::warning::V3_DEV_PG_POOLER_URL secret not set — skipping types drift check."
            exit 0
          fi
          supabase gen types typescript --db-url "$PGURL" --schema public \
            > /tmp/types_regen_cli.ts
          normalize() {
            sed '/^  \/\/ Allows to automatically instantiate/,/^  }$/d' "$1" \
              | sed -e 's/[[:space:]]*$//' | awk 'NF {p=1} p' | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}'
          }
          normalize packages/supabase/src/types.generated.ts > /tmp/types_committed.norm
          normalize /tmp/types_regen_cli.ts                  > /tmp/types_regen.norm
          if ! diff -u /tmp/types_committed.norm /tmp/types_regen.norm; then
            echo "::error::types.generated.ts is stale relative to the live DB schema."
            echo "Run generate_typescript_types via MCP, write to packages/supabase/src/types.generated.ts verbatim, and commit."
            exit 1
          fi
          echo "types.generated.ts is up to date with the live schema."

      # Compare local migration file count with cloud schema_migrations row count.
      # INFORMATIONAL ONLY — does not block the run.
      #
      # Limitation: cloud version IDs are clock-assigned (S36+ convention) and
      # do NOT map 1:1 to local file name-block prefixes. Additionally, ~400 rows
      # were dropped by 'supabase migration repair' (max tracked: 20260629000012);
      # actual schema is intact. A hard gate is infeasible without a name→version
      # mapping. Verify manually with: supabase migration list --project-ref ikcyvlovptebroadgtvd
      - name: Check schema_migrations drift (informational)
        env:
          PGURL: ${{ secrets.V3_DEV_PG_POOLER_URL }}
        run: |
          set -uo pipefail
          if [ -z "${PGURL:-}" ]; then
            echo "::warning::V3_DEV_PG_POOLER_URL not set — skipping schema drift check."
            exit 0
          fi
          local_count=$(ls supabase/migrations/*.sql 2>/dev/null | wc -l | tr -d ' ')
          cloud_count=$(psql "$PGURL" -t -c \
            "SELECT count(*) FROM supabase_migrations.schema_migrations;" \
            2>/dev/null | tr -d ' ' || echo "error")
          echo "Local migration files : $local_count"
          echo "Cloud schema_migrations rows: $cloud_count (clock-assigned; baseline ~400 dropped)"
          if [ "$cloud_count" = "error" ]; then
            echo "::warning::Could not query schema_migrations — check pooler URL and permissions."
          elif [ "$cloud_count" -lt "$local_count" ]; then
            echo "::warning::Drift: $local_count local files vs $cloud_count cloud rows."
            echo "Some migrations may not be applied. Verify with MCP list_migrations or"
            echo "'supabase migration list --project-ref ikcyvlovptebroadgtvd'."
            echo "(Known baseline: ~400 rows dropped by migration repair — see CLAUDE.md)"
          else
            echo "schema_migrations count parity OK (approximate — see known limitations above)."
          fi
