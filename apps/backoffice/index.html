<!doctype html>
<html lang="en" class="theme-backoffice">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Breakery Backoffice</title>
    <!--
      Session 14 D3 / Phase 1.A — font-loading strategy: same as POS.
      Fonts loaded via fontsource CSS imports in src/index.css with
      `font-display: swap`. Inline @font-face descriptor below aligns the
      system fallback metrics to Inter to reduce layout shift on swap.
    -->
    <style>
      @font-face {
        font-family: 'Inter Fallback';
        src: local('Arial');
        size-adjust: 107%;
        ascent-override: 90%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
    </style>
  </head>
  <body class="bg-bg-base text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
