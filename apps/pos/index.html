<!doctype html>
<html lang="en" class="dark theme-pos">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="icon" href="/favicon.svg" />
    <title>The Breakery POS</title>
    <!--
      Session 14 D3 / Phase 1.A — font-loading strategy:
      The 4 canonical fonts (Inter / Playfair Display / Fraunces / JetBrains
      Mono) are loaded via fontsource CSS imports in src/index.css.
      fontsource's CSS emits `font-display: swap` so the page renders
      immediately with system fallbacks then swaps to the web font when ready
      (avoids FOIT, accepts brief FOUT — Luxe Bakery convention).

      The inline @font-face descriptors below shrink the layout shift on swap
      by aligning the system fallback metrics to Inter as closely as possible
      (`size-adjust: 107%`, `ascent-override: 90%` — values from the
      fontsource/inter design tokens). The actual font files are still loaded
      via Vite's CSS bundling — no manual preload to avoid hashing surprises.
    -->
    <style>
      @font-face {
        font-family: 'Inter Fallback';
        src: local('Arial');
        size-adjust: 107%;
        ascent-override: 90%;
        descent-override: 22%;
        line-gap-override: 0%;
      }
    </style>
  </head>
  <body class="bg-bg-base text-text-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
